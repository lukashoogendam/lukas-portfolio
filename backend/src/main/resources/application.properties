# ===========================
# Lukas.dev API Portfolio
# ===========================

# Server
server.port=8080
spring.threads.virtual.enabled=true
spring.mvc.problemdetails.enabled=true

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/lukas_portfolio
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
cors.allowed-origins=http://localhost:4200

# JWT
jwt.secret=lukas-portfolio-jwt-secret-key-wijzig-voor-productie

# Cookie Configuration
cookie.http-only=true
cookie.secure=false
cookie.same-site=Lax
cookie.path=/
cookie.max-age=86400

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload-dir=uploads
app.base-url=http://localhost:8080

# Admin Defaults (for local dev)
app.admin.email=admin@lukas.dev
app.admin.password=admin123!
