# ===========================
# Lukas.dev API Portfolio
# Production Profile
# ===========================

# Server
server.port=8080
server.forward-headers-strategy=framework
spring.threads.virtual.enabled=true
spring.mvc.problemdetails.enabled=true

# Database (from environment variables)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost}

# Admin Credentials
app.admin.email=${ADMIN_EMAIL_1}
app.admin.password=${ADMIN_PASSWORD_1}

# JWT
jwt.secret=${JWT_SECRET}

# Cookie Configuration
cookie.http-only=true
cookie.secure=true
cookie.same-site=Strict
cookie.path=/
cookie.max-age=86400

# File Upload
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
app.upload-dir=uploads
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Seeder uitgeschakeld in productie
app.seeder.enabled=false
