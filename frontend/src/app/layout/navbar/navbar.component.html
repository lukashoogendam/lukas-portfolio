<nav class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="navbar-brand">
      <span class="brand-icon">&#123;&#125;</span>
      <span class="brand-text">Lukas<span class="brand-accent">.dev</span> API</span>
    </a>

    <div class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
      <a routerLink="/explorer" routerLinkActive="active" class="nav-link">API Explorer</a>
      <a routerLink="/contact" routerLinkActive="active" class="nav-link">Contact</a>
    </div>

    <div class="navbar-actions">
      <!-- Language switcher -->
      <div class="lang-switcher">
        <button
          id="lang-nl-btn"
          class="lang-btn"
          [class.lang-active]="langService.currentLang() === 'nl'"
          (click)="setLang('nl')"
          aria-label="Switch to Dutch">
          🇳🇱 NL
        </button>
        <button
          id="lang-en-btn"
          class="lang-btn"
          [class.lang-active]="langService.currentLang() === 'en'"
          (click)="setLang('en')"
          aria-label="Switch to English">
          🇬🇧 EN
        </button>
      </div>

      <a href="http://localhost:8080/swagger-ui.html" target="_blank" class="nav-btn swagger-btn">
        Swagger UI
      </a>
    </div>
  </div>
</nav>
