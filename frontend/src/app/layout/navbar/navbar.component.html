<nav class="topbar" [class.scrolled]="isScrolled()">
  <div class="topbar-inner">
    <a routerLink="/" class="brand" (click)="scrollTo('hero')">
      <span class="br">&#123;&#125;</span>
      <span class="brand-text">lukas<span class="dim">&#64;portfolio</span></span>
    </a>

    <div class="topnav" aria-label="Secties">
      <button class="topnav-link" (click)="scrollTo('about')">about</button>
      <button class="topnav-link" (click)="scrollTo('skills')">skills</button>
      <button class="topnav-link" (click)="scrollTo('projects')">projects</button>
      <button class="topnav-link" (click)="scrollTo('timeline')">timeline</button>
      <button class="topnav-link" (click)="scrollTo('contact')">contact</button>
    </div>

    <div class="controls">
      <div class="lang" role="group" aria-label="Taal">
        <button
          id="lang-nl-btn"
          type="button"
          [attr.aria-pressed]="langService.currentLang() === 'nl'"
          (click)="setLang('nl')">NL</button>
        <button
          id="lang-en-btn"
          type="button"
          [attr.aria-pressed]="langService.currentLang() === 'en'"
          (click)="setLang('en')">EN</button>
      </div>

      <button
        class="themebtn"
        type="button"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Schakel naar licht thema' : 'Schakel naar donker thema'">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true">
          <use [attr.href]="themeService.theme() === 'dark' ? '#i-moon' : '#i-sun'"></use>
        </svg>
      </button>

      <button class="mobile-toggle-btn" (click)="toggleMobileMenu()" aria-label="Toggle menu">
        <span class="hamburger" [class.open]="isMobileMenuOpen()"></span>
      </button>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
    <div class="mobile-menu">
      <button class="topnav-link mobile-link" (click)="scrollTo('hero')">{{ 'nav.home' | t }}</button>
      <button class="topnav-link mobile-link" (click)="scrollTo('about')">{{ 'nav.about' | t }}</button>
      <button class="topnav-link mobile-link" (click)="scrollTo('skills')">{{ 'nav.skills' | t }}</button>
      <button class="topnav-link mobile-link" (click)="scrollTo('projects')">{{ 'nav.projects' | t }}</button>
      <button class="topnav-link mobile-link" (click)="scrollTo('timeline')">{{ 'nav.experience' | t }}</button>
      <button class="topnav-link mobile-link" (click)="scrollTo('contact')">{{ 'nav.contact' | t }}</button>
    </div>
  }
</nav>
