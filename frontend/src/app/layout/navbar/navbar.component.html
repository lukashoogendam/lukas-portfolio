<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar-inner">
    <a routerLink="/" class="navbar-brand">
      <span class="brand-icon">&#123;&#125;</span>
      <span class="brand-text">Lukas <span class="brand-accent">portfolio</span></span>
    </a>
    <div class="navbar-links">
      <button class="nav-link nav-btn" (click)="scrollTo('hero')">{{ 'nav.home' | t }}</button>
      <button class="nav-link nav-btn" (click)="scrollTo('about')">{{ 'nav.about' | t }}</button>
      <button class="nav-link nav-btn" (click)="scrollTo('skills')">{{ 'nav.skills' | t }}</button>
      <button class="nav-link nav-btn" (click)="scrollTo('projects')">{{ 'nav.projects' | t }}</button>
      <button class="nav-link nav-btn" (click)="scrollTo('timeline')">{{ 'nav.experience' | t }}</button>
      <button class="nav-link nav-btn" (click)="scrollTo('contact')">{{ 'nav.contact' | t }}</button>
    </div>
    <div class="navbar-actions">
      <div class="lang-switcher">
        <button
          id="lang-nl-btn"
          class="lang-btn"
          [class.lang-active]="langService.currentLang() === 'nl'"
          (click)="setLang('nl')"
          aria-label="Switch to Dutch">
          🇳🇱 NL
        </button>
        <button
          id="lang-en-btn"
          class="lang-btn"
          [class.lang-active]="langService.currentLang() === 'en'"
          (click)="setLang('en')"
          aria-label="Switch to English">
          🇬🇧 EN
        </button>
      </div>
      <button class="mobile-toggle-btn" (click)="toggleMobileMenu()" aria-label="Toggle menu">
        <span class="hamburger" [class.open]="isMobileMenuOpen()"></span>
      </button>
    </div>
  </div>
  @if (isMobileMenuOpen()) {
    <div class="mobile-menu">
      <button class="nav-link nav-btn mobile-link" (click)="scrollTo('hero')">{{ 'nav.home' | t }}</button>
      <button class="nav-link nav-btn mobile-link" (click)="scrollTo('about')">{{ 'nav.about' | t }}</button>
      <button class="nav-link nav-btn mobile-link" (click)="scrollTo('skills')">{{ 'nav.skills' | t }}</button>
      <button class="nav-link nav-btn mobile-link" (click)="scrollTo('projects')">{{ 'nav.projects' | t }}</button>
      <button class="nav-link nav-btn mobile-link" (click)="scrollTo('timeline')">{{ 'nav.experience' | t }}</button>
      <button class="nav-link nav-btn mobile-link" (click)="scrollTo('contact')">{{ 'nav.contact' | t }}</button>
    </div>
  }
</nav>
