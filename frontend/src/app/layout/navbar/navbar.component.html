<nav class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="navbar-brand">
      <span class="brand-icon">&#123;&#125;</span>
      <span class="brand-text">Lukas <span class="brand-accent">portfolio</span></span>
    </a>
    <div class="navbar-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">Home</a>
      <a routerLink="/explorer" routerLinkActive="active" class="nav-link">API Explorer</a>
      <a routerLink="/contact" routerLinkActive="active" class="nav-link">Contact</a>
    </div>
    <div class="navbar-actions">
      <div class="lang-switcher">
        <button
          id="lang-nl-btn"
          class="lang-btn"
          [class.lang-active]="langService.currentLang() === 'nl'"
          (click)="setLang('nl')"
          aria-label="Switch to Dutch">
          🇳🇱 NL
        </button>
        <button
          id="lang-en-btn"
          class="lang-btn"
          [class.lang-active]="langService.currentLang() === 'en'"
          (click)="setLang('en')"
          aria-label="Switch to English">
          🇬🇧 EN
        </button>
      </div>
      <button class="mobile-toggle-btn" (click)="toggleMobileMenu()" aria-label="Toggle menu">
        <span class="hamburger" [class.open]="isMobileMenuOpen()"></span>
      </button>
    </div>
  </div>
  @if (isMobileMenuOpen()) {
    <div class="mobile-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link mobile-link" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/explorer" routerLinkActive="active" class="nav-link mobile-link" (click)="closeMobileMenu()">API Explorer</a>
      <a routerLink="/contact" routerLinkActive="active" class="nav-link mobile-link" (click)="closeMobileMenu()">Contact</a>
    </div>
  }
</nav>
