<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">🔐</div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-subtitle">Log in om je portfolio te beheren</p>
    </div>

    @if (authService.loginError()) {
      <div class="error-banner">
        <span class="error-icon">⚠️</span>
        {{ authService.loginError() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input
          id="email"
          type="email"
          class="form-input"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          placeholder="admin@lukas.dev"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Wachtwoord</label>
        <input
          id="password"
          type="password"
          class="form-input"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="submit-btn" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="spinner"></span> Inloggen...
        } @else {
          Inloggen →
        }
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/" class="back-link">← Terug naar portfolio</a>
    </div>
  </div>
</div>
