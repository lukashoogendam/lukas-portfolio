<div class="admin">
  <header class="admin-header">
    <div class="header-left">
      <h1 class="header-title">Admin Dashboard</h1>
      <span class="header-email">{{ authService.currentEmail() }}</span>
    </div>
    <div class="header-right">
      <a routerLink="/" class="header-btn secondary">← Portfolio</a>
      <button class="header-btn danger" (click)="logout()">Uitloggen</button>
    </div>
  </header>
  
  <nav class="tabs">
    <button class="tab" [class.active]="activeTab() === 'projects'" (click)="switchTab('projects')">
      Projects
    </button>
    <button class="tab" [class.active]="activeTab() === 'skills'" (click)="switchTab('skills')">
      Skills
    </button>
    <button class="tab" [class.active]="activeTab() === 'socials'" (click)="switchTab('socials')">
      Socials
    </button>
    <button class="tab" [class.active]="activeTab() === 'profile'" (click)="switchTab('profile')">
      Profiel
    </button>
  </nav>
  
  <div class="content">
    @switch (activeTab()) {
      @case ('projects') { <app-admin-projects /> }
      @case ('skills') { <app-admin-skills /> }
      @case ('socials') { <app-admin-socials /> }
      @case ('profile') { <app-admin-profile /> }
    }
  </div>
</div>
