<aside class="sidebar" [class.mobile-open]="isMobileSidebarOpen()">
  <div class="sidebar-header">
    <div class="sidebar-title-row" (click)="toggleMobileSidebar()" style="cursor: pointer;">
      <h2 class="sidebar-title">Endpoints</h2>
      <span class="endpoint-count">{{ totalEndpointCount }}</span>
      <span class="mobile-toggle-icon" [class.open]="isMobileSidebarOpen()">▼</span>
    </div>
    <a [href]="swaggerUrl" target="_blank" class="swagger-btn">Swagger UI</a>
  </div>

  <div class="endpoint-list">
    @for (group of endpointGroups(); track group.name) {
      <div class="endpoint-group">
        <button class="group-header" (click)="toggleGroup(group)">
          <span class="group-icon">{{ group.icon }}</span>
          <span class="group-name">{{ group.name }}</span>
          <span class="group-badge">{{ group.endpoints.length }}</span>
          <span class="group-chevron" [class.open]="group.expanded">›</span>
        </button>

        @if (group.expanded) {
          <div class="group-endpoints">
            @for (endpoint of group.endpoints; track endpoint.path) {
              <button
                class="endpoint-item"
                [class.active]="selectedEndpoint() === endpoint"
                (click)="selectEndpoint(endpoint)">
                <span class="method-badge" [class]="endpoint.method.toLowerCase()">
                  {{ endpoint.method }}
                </span>
                <div class="endpoint-info">
                  <span class="endpoint-path">{{ endpoint.path }}</span>
                  <span class="endpoint-desc">{{ endpoint.description }}</span>
                </div>
              </button>
            }
          </div>
        }
      </div>
    }
  </div>
</aside>
